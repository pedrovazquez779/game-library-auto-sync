# Syncs your Steam library into Notion on a schedule, using GitHub's free
# runners — no server needed. Add your 4 credentials as repository secrets
# (Settings → Secrets and variables → Actions) and enable workflows in the
# Actions tab. See "Keeping it in sync automatically" in the README.
name: Sync

on:
  schedule:
    # Every 6 hours. Runs at :17 because GitHub delays or drops jobs queued
    # at the top of the hour, when load spikes.
    - cron: "17 */6 * * *"
  # Lets you trigger a sync manually from the Actions tab.
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Sync library
        run: go run . -once
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID64: ${{ secrets.STEAM_ID64 }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
